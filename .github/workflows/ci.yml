name: CI

# Quality gate sulle pull request verso main: lint, typecheck e build.
# È il check richiesto dalla branch protection prima del merge.
# Il DEPLOY su Firebase NON avviene qui: lo fa App Hosting in automatico al
# push su main (integrazione GitHub nativa).

on:
  pull_request:
    branches: [main]
  # Esegue anche su push a main (post-merge) come rete di sicurezza.
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
