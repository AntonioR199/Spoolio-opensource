# Config dello stack Supabase locale (Docker) per Spoolio.
# Avvio: `supabase start` (richiede Docker). Reset schema: `supabase db reset`.
# Le porte sono i default della CLI; cambiale se confliggono in locale.

project_id = "spoolio"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
# Cattura le email locali (es. link/codici) su una UI web, senza inviarle davvero.
enabled = true
port = 54324

[storage]
enabled = true
# Limite upload allineato al limite PDF dell'app (15 MB) con un po' di margine.
file_size_limit = "50MiB"

[auth]
enabled = true
# In locale l'app gira su http://localhost:3220 (vedi script `dev`).
site_url = "http://localhost:3220"
additional_redirect_urls = ["http://localhost:3220/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
# Niente conferma email in locale: ci si registra e si entra subito.
enable_confirmations = false

[auth.mfa]
# La 2FA TOTP funziona anche in locale (l'app la espone in Impostazioni).
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true
